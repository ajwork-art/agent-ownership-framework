name: Validate AOF Contracts

on:
  push:
    paths:
      - "examples/**"
      - "schema/**"
  pull_request:
    paths:
      - "examples/**"
      - "schema/**"

jobs:
  validate:
    name: Validate Agent Ownership Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml>=6.0 jsonschema>=4.0

      - name: Validate all example contracts
        id: validate
        run: |
          python tools/validate-contract.py examples/*.yaml
        continue-on-error: false

      - name: Report validation results
        if: failure()
        run: |
          echo ""
          echo "One or more contracts failed validation."
          echo ""
          echo "To fix, run locally:"
          echo "  pip install pyyaml jsonschema"
          echo "  python tools/validate-contract.py --verbose examples/*.yaml"
          echo ""
          echo "See docs/SCHEMA.md for complete field reference."
          echo "See docs/TROUBLESHOOTING.md for common errors and fixes."
          exit 1
