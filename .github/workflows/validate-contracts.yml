name: Validate AOF Contracts

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
    paths:
      - "examples/**"
      - "schema/**"
      - "tools/validate-contract.py"
  pull_request:
    paths:
      - "examples/**"
      - "schema/**"
      - "tools/validate-contract.py"

jobs:
  validate:
    name: Validate Agent Ownership Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "tools/requirements.txt"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt

      - name: Validate all example contracts
        id: validate
        run: |
          echo "Validating AOF contracts in examples/..."
          python tools/validate-contract.py examples/*.yaml

      - name: Validate example schema
        run: |
          echo "Validating annotated schema example..."
          python tools/validate-contract.py schema/v1/agent-ownership-contract.example.yaml

      - name: Report validation success
        if: success()
        run: |
          echo ""
          echo "All contracts passed validation."

      - name: Report validation failure
        if: failure()
        run: |
          echo ""
          echo "One or more contracts failed validation."
          echo ""
          echo "To reproduce locally:"
          echo "  pip install -r tools/requirements.txt"
          echo "  python tools/validate-contract.py --verbose examples/*.yaml"
          echo ""
          echo "Reference:"
          echo "  docs/SCHEMA.md      — Complete field reference"
          echo "  docs/TROUBLESHOOTING.md — Common errors and fixes"
          exit 1
