name: CI

# Runs the AOF validator test suites (Python and Node.js) and validates every
# example contract and the annotated schema example against the JSON Schema.
# This is the repository's own continuous-integration workflow — the badge in
# the README reflects the status of this file.

on:
  push:
    branches:
      - main
      - "feature/**"
      - "feat/**"
      - "fix/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python validator + examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "tools/requirements.txt"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt

      - name: Validate all example contracts
        run: python tools/validate-contract.py examples/*.yaml

      - name: Validate annotated schema example
        run: python tools/validate-contract.py schema/v1/agent-ownership-contract.example.yaml

      - name: Check governance boundaries (aof check) for every example
        run: |
          for f in examples/*.yaml; do
            echo "::group::aof check $f"
            python tools/aof check "$f"
            echo "::endgroup::"
          done

  node:
    name: Node validator + examples
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Node dependencies
        run: npm install

      - name: Validate all example contracts
        run: npm test

      - name: Validate annotated schema example
        run: node validate-contract.js ../schema/v1/agent-ownership-contract.example.yaml
